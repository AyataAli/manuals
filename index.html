<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>manuals</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #fafafa;
      font-weight: 600;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    a.file-link {
      color: #222;
      text-decoration: none;
      font-weight: 500;
    }

    a.file-link:hover {
      text-decoration: underline;
    }

    a.download-link {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-decoration: none;
      color: #222;
      background: #fff;
    }

    a.download-link:hover {
      background: #f3f3f3;
    }

    .message {
      padding: 18px 16px;
      color: #666;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.55);
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      width: min(1000px, 100%);
      height: min(90vh, 800px);
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid #eee;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #222;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #f3f3f3;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 640px) {
      th:first-child,
      td:first-child {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <input id="searchInput" class="search" type="search" placeholder="PDF ara..." />

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th style="width: 70px;">No</th>
            <th>Dosya</th>
            <th style="width: 120px;">İndir</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">PDF</div>
        <div class="modal-actions">
          <a id="openNewTab" class="btn" href="#" target="_blank" rel="noreferrer">Yeni sekme</a>
          <a id="downloadPdf" class="btn" href="#" download>İndir</a>
          <button id="closeModal" class="btn" type="button">Kapat</button>
        </div>
      </div>
      <iframe id="pdfViewer" title="PDF görüntüleyici"></iframe>
    </div>
  </div>

  <script>
    const BASE_URL = "https://raw.githubusercontent.com/AyataAli/manuals/main/";

    const files = [
      "Alcon Constellation 30c42a626e07ba541810c5c820146363f85d296dc2e186e5aaa6b1226b6e7f02.pdf",
      "Alcon Constellation.pdf",
      "Alcon Constellation1b5998f83d910ba2529d7c261794b60ef0952d928da432f70255e3e6c1b9eeb5.pdf",
      "Alcon Constellation648d9720fc5e9090cd01dcb505d954daf3642e101d37265cf98d319ffa254562.pdf",
      "Alcon Constellation89ab7f3dd9dd61e3e5bf207851810ea382c09dd16268524ebe87e43162182c37.pdf",
      "Alcon Constellationb0f32fc60f0bb33e37ebd9430b461bbd5da9b9a12412204d33ea7d3783a1f87b.pdf",
      "Alcon Constellationfe065e1cd5c2859aa4c26fc36d1c21cb7529e22cdccb01294ac5d7a569fef86f.pdf",
      "CSO Sirius user-manual-sirius.pdf",
      "CSO_Sirius_PPH.pdf",
      "Huvitz-HRK-9000A-User-Manual.pdf",
      "IOL Master 500 000000-1692-983-doks-tr-tr-310322.pdf",
      "IOLmaster500 000000-1692-983-doks-en-my-300625.pdf",
      "TOPCON DRI OCT-1 TRITON USER MANUAL 07b886.pdf",
      "VISUMAX 800 Brochure EN.pdf",
      "VISUMAX 800 Brochure TR.pdf",
      "Zeıs IOL calc 000000-2616-198-doks-en-us-020823.pdf",
      "en-cv-5000pro-topcon-brochure 2.pdf",
      "topcon-cl-200-autolensometer_.pdf",
      "topcon-trk1p-eng-1.pdf"
    ];

    const state = { search: "" };

    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const pdfViewer = document.getElementById("pdfViewer");
    const openNewTab = document.getElementById("openNewTab");
    const downloadPdf = document.getElementById("downloadPdf");
    const closeModal = document.getElementById("closeModal");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getRawUrl(fileName) {
      return BASE_URL + fileName.split("/").map(encodeURIComponent).join("/");
    }

    function getFilteredFiles() {
      const query = state.search.trim().toLocaleLowerCase("tr");
      return files
        .filter((name) => !query || name.toLocaleLowerCase("tr").includes(query))
        .sort((a, b) => a.localeCompare(b, "tr", { sensitivity: "base" }));
    }

    function renderTable() {
      const filtered = getFilteredFiles();

      if (!filtered.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="message">PDF bulunamadı.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = filtered.map((name, index) => `
        <tr>
          <td>${index + 1}</td>
          <td><a href="#" class="file-link" data-file="${escapeHtml(name)}">${escapeHtml(name)}</a></td>
          <td><a class="download-link" href="${getRawUrl(name)}" download target="_blank" rel="noreferrer">İndir</a></td>
        </tr>
      `).join("");

      tableBody.querySelectorAll("[data-file]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          openPdf(link.dataset.file);
        });
      });
    }

    function openPdf(fileName) {
      const url = getRawUrl(fileName);
      modalTitle.textContent = fileName;
      pdfViewer.src = url;
      openNewTab.href = url;
      downloadPdf.href = url;
      downloadPdf.setAttribute("download", fileName);
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closePdf() {
      modal.classList.remove("open");
      pdfViewer.src = "";
      document.body.style.overflow = "";
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value || "";
      renderTable();
    });

    closeModal.addEventListener("click", closePdf);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closePdf();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closePdf();
    });

    renderTable();
  </script>
</body>
</html>
