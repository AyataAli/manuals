<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>manuals</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
      font-weight: 600;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #fafafa;
      font-weight: 600;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    a.file-link {
      color: #222;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    a.file-link:hover {
      text-decoration: underline;
    }

    a.download-link {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-decoration: none;
      color: #222;
      background: #fff;
    }

    a.download-link:hover {
      background: #f3f3f3;
    }

    .message {
      padding: 18px 16px;
      color: #666;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.55);
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      width: min(1000px, 100%);
      height: min(90vh, 800px);
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid #eee;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #222;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #f3f3f3;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 640px) {
      .wrap {
        margin: 20px auto;
      }

      h1 {
        font-size: 24px;
      }

      table {
        font-size: 14px;
      }

      th:nth-child(1),
      td:nth-child(1) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>manuals</h1>
    <input id="searchInput" class="search" type="search" placeholder="PDF ara..." />

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th style="width: 70px;">No</th>
            <th>Dosya</th>
            <th style="width: 120px;">İndir</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="3" class="message">Yükleniyor...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">PDF</div>
        <div class="modal-actions">
          <a id="openNewTab" class="btn" href="#" target="_blank" rel="noreferrer">Yeni sekme</a>
          <a id="downloadPdf" class="btn" href="#" download>İndir</a>
          <button id="closeModal" class="btn" type="button">Kapat</button>
        </div>
      </div>
      <iframe id="pdfViewer" title="PDF görüntüleyici"></iframe>
    </div>
  </div>

  <script>
    const CONFIG = {
      owner: "AyataAli",
      repo: "manuals",
      branch: "main"
    };

    const state = {
      files: [],
      search: ""
    };

    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const pdfViewer = document.getElementById("pdfViewer");
    const openNewTab = document.getElementById("openNewTab");
    const downloadPdf = document.getElementById("downloadPdf");
    const closeModal = document.getElementById("closeModal");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getRawUrl(fileName) {
      return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${encodeURIComponent(fileName)}`;
    }

    function getFilteredFiles() {
      const query = state.search.trim().toLowerCase();
      return state.files
        .filter((file) => !query || file.name.toLowerCase().includes(query))
        .sort((a, b) => a.name.localeCompare(b.name, "tr", { sensitivity: "base" }));
    }

    function renderTable() {
      const files = getFilteredFiles();

      if (!files.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="message">PDF bulunamadı.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = files.map((file, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>
            <a href="#" class="file-link" data-file="${escapeHtml(file.name)}">${escapeHtml(file.name)}</a>
          </td>
          <td>
            <a
              class="download-link"
              href="${getRawUrl(file.name)}"
              download="${escapeHtml(file.name)}"
              target="_blank"
              rel="noreferrer"
            >İndir</a>
          </td>
        </tr>
      `).join("");

      tableBody.querySelectorAll("[data-file]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          openPdf(link.dataset.file);
        });
      });
    }

    function openPdf(fileName) {
      const url = getRawUrl(fileName);
      modalTitle.textContent = fileName;
      pdfViewer.src = url;
      openNewTab.href = url;
      downloadPdf.href = url;
      downloadPdf.setAttribute("download", fileName);
      modal.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closePdf() {
      modal.classList.remove("open");
      pdfViewer.src = "";
      document.body.style.overflow = "";
    }

    async function loadFiles() {
      try {
        const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents`);
        if (!response.ok) {
          throw new Error(`GitHub API hatası: ${response.status}`);
        }

        const data = await response.json();
        state.files = data.filter(
          (item) =>
            item &&
            item.type === "file" &&
            typeof item.name === "string" &&
            item.name.toLowerCase().endsWith(".pdf")
        );

        renderTable();
      } catch (error) {
        console.error(error);
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="message">PDF listesi yüklenemedi.</td>
          </tr>
        `;
      }
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value || "";
      renderTable();
    });

    closeModal.addEventListener("click", closePdf);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closePdf();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closePdf();
      }
    });

    loadFiles();
  </script>
</body>
</html>
