<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manuals PDF Arşivi</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #0b1220;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: #243041;
      --hover: #182233;
      --accent: #2563eb;
      --white: #ffffff;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220, #111827);
      color: var(--text);
    }

    .wrap {
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
    }

    .zip-link,
    .btn,
    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }

    .zip-link:hover,
    .btn:hover,
    .download-link:hover {
      background: var(--hover);
    }

    .note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .search {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: var(--panel);
      color: var(--muted);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .file-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .file-link:hover {
      text-decoration: underline;
    }

    .meta {
      color: var(--muted);
      white-space: nowrap;
    }

    .message {
      padding: 18px 16px;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      width: min(1180px, 100%);
      height: min(94vh, 920px);
      background: var(--white);
      color: #111827;
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .modal-title {
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }

    .modal .btn,
    .modal .download-link {
      min-height: 36px;
      background: #ffffff;
      color: #111827;
      border-color: #d1d5db;
    }

    .viewer-wrap {
      overflow: auto;
      background: #d1d5db;
      padding: 18px;
    }

    .pdf-pages {
      display: grid;
      gap: 16px;
      justify-content: center;
    }

    .pdf-page {
      display: block;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.14);
    }

    .pdf-loading {
      padding: 24px;
      text-align: center;
      color: #4b5563;
      background: #ffffff;
      border-radius: 8px;
      min-width: 280px;
    }

    @media (max-width: 760px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      h1 {
        font-size: 24px;
      }

      .modal-box {
        height: 95vh;
      }

      .modal-header {
        padding: 10px 12px;
        align-items: flex-start;
        flex-direction: column;
      }

      .modal-actions {
        width: 100%;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Manuals PDF Arşivi</h1>
      <a class="zip-link" href="https://github.com/AyataAli/manuals/archive/refs/heads/main.zip">ZIP indir</a>
    </div>

    <p class="note">Dosya adına tıklayınca görüntüleyici açılır. Sağdaki butondan doğrudan indirebilirsiniz.</p>

    <input id="searchInput" class="search" type="search" placeholder="PDF ara..." />

    <div class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 70px;">No</th>
              <th>Dosya</th>
              <th style="width: 90px;">Sayfa</th>
              <th style="width: 110px;">Boyut</th>
              <th style="width: 120px;">İndir</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="5" class="message">PDF listesi yükleniyor...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">PDF</div>
        <div class="modal-actions">
          <a id="downloadPdf" class="download-link" href="#" download>İndir</a>
          <button id="closeModal" class="btn" type="button">Kapat</button>
        </div>
      </div>

      <div id="viewerWrap" class="viewer-wrap">
        <div id="pdfPages" class="pdf-pages"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

    const files = [
      "Alcon Constellation 30c42a626e07ba541810c5c820146363f85d296dc2e186e5aaa6b1226b6e7f02.pdf",
      "Alcon Constellation.pdf",
      "Alcon Constellation1b5998f83d910ba2529d7c261794b60ef0952d928da432f70255e3e6c1b9eeb5.pdf",
      "Alcon Constellation648d9720fc5e9090cd01dcb505d954daf3642e101d37265cf98d319ffa254562.pdf",
      "Alcon Constellation89ab7f3dd9dd61e3e5bf207851810ea382c09dd16268524ebe87e43162182c37.pdf",
      "Alcon Constellationb0f32fc60f0bb33e37ebd9430b461bbd5da9b9a12412204d33ea7d3783a1f87b.pdf",
      "Alcon Constellationfe065e1cd5c2859aa4c26fc36d1c21cb7529e22cdccb01294ac5d7a569fef86f.pdf",
      "CSO Sirius user-manual-sirius.pdf",
      "CSO_Sirius_PPH.pdf",
      "Huvitz-HRK-9000A-User-Manual.pdf",
      "IOL Master 500 000000-1692-983-doks-tr-tr-310322.pdf",
      "IOLmaster500 000000-1692-983-doks-en-my-300625.pdf",
      "TOPCON DRI OCT-1 TRITON USER MANUAL 07b886.pdf",
      "VISUMAX 800 Brochure EN.pdf",
      "VISUMAX 800 Brochure TR.pdf",
      "Zeıs IOL calc 000000-2616-198-doks-en-us-020823.pdf",
      "en-cv-5000pro-topcon-brochure 2.pdf",
      "topcon-cl-200-autolensometer_.pdf",
      "topcon-trk1p-eng-1.pdf"
    ];

    const state = {
      search: "",
      meta: new Map(),
      renderToken: 0,
      currentFile: ""
    };

    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const downloadPdf = document.getElementById("downloadPdf");
    const closeModal = document.getElementById("closeModal");
    const viewerWrap = document.getElementById("viewerWrap");
    const pdfPages = document.getElementById("pdfPages");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fileUrl(fileName) {
      return `./${fileName.split("/").map(encodeURIComponent).join("/")}`;
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "-";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function getFilteredFiles() {
      const query = state.search.trim().toLocaleLowerCase("tr");
      return files
        .filter((name) => !query || name.toLocaleLowerCase("tr").includes(query))
        .sort((a, b) => a.localeCompare(b, "tr", { sensitivity: "base" }));
    }

    function getPages(name) {
      return state.meta.get(name)?.pages ?? "…";
    }

    function getSize(name) {
      return state.meta.get(name)?.sizeText ?? "…";
    }

    function renderTable() {
      const filtered = getFilteredFiles();

      if (!filtered.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="5" class="message">PDF bulunamadı.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = filtered.map((name, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>
            <a href="#" class="file-link" data-file="${escapeHtml(name)}">${escapeHtml(name)}</a>
          </td>
          <td class="meta">${escapeHtml(String(getPages(name)))}</td>
          <td class="meta">${escapeHtml(String(getSize(name)))}</td>
          <td>
            <a class="download-link" href="${fileUrl(name)}" download="${escapeHtml(name)}">İndir</a>
          </td>
        </tr>
      `).join("");

      tableBody.querySelectorAll("[data-file]").forEach((link) => {
        link.addEventListener("click", async (event) => {
          event.preventDefault();
          await openPdf(link.dataset.file);
        });
      });
    }

    function clearViewer() {
      pdfPages.innerHTML = "";
      viewerWrap.scrollTop = 0;
    }

    function showLoading() {
      pdfPages.innerHTML = `<div class="pdf-loading">PDF yükleniyor...</div>`;
      viewerWrap.scrollTop = 0;
    }

    async function renderAllPages(pdfDoc, token) {
      clearViewer();

      for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber += 1) {
        if (token !== state.renderToken) return;

        const page = await pdfDoc.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const maxWidth = Math.min(viewerWrap.clientWidth - 32, 980);
        const scale = Math.max(0.75, maxWidth / baseViewport.width);
        const viewport = page.getViewport({ scale });

        const canvas = document.createElement("canvas");
        canvas.className = "pdf-page";
        canvas.width = Math.floor(viewport.width);
        canvas.height = Math.floor(viewport.height);

        const context = canvas.getContext("2d");
        pdfPages.appendChild(canvas);

        await page.render({
          canvasContext: context,
          viewport
        }).promise;
      }
    }

    async function openPdf(fileName) {
      try {
        const url = fileUrl(fileName);
        state.currentFile = fileName;
        modalTitle.textContent = fileName;
        downloadPdf.href = url;
        downloadPdf.setAttribute("download", fileName);

        modal.classList.add("open");
        document.body.style.overflow = "hidden";
        showLoading();

        const token = ++state.renderToken;
        const pdfDoc = await pdfjsLib.getDocument(url).promise;

        if (token !== state.renderToken) return;
        await renderAllPages(pdfDoc, token);
      } catch (error) {
        console.error(error);
        pdfPages.innerHTML = `<div class="pdf-loading">PDF açılamadı.</div>`;
      }
    }

    function closePdfModal() {
      state.renderToken += 1;
      modal.classList.remove("open");
      document.body.style.overflow = "";
      clearViewer();
      state.currentFile = "";
    }

    async function loadPdfMeta(fileName) {
      try {
        const url = fileUrl(fileName);

        const [headResponse, pdfDoc] = await Promise.all([
          fetch(url, { method: "HEAD" }),
          pdfjsLib.getDocument(url).promise
        ]);

        const size = Number(headResponse.headers.get("content-length")) || null;

        state.meta.set(fileName, {
          pages: pdfDoc.numPages,
          sizeText: size ? formatBytes(size) : "-"
        });
      } catch (error) {
        console.error(error);
        state.meta.set(fileName, {
          pages: "-",
          sizeText: "-"
        });
      }

      renderTable();
    }

    async function loadAllMeta() {
      renderTable();
      await Promise.all(files.map(loadPdfMeta));
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value || "";
      renderTable();
    });

    closeModal.addEventListener("click", closePdfModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closePdfModal();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closePdfModal();
    });

    window.addEventListener("resize", async () => {
      if (!modal.classList.contains("open") || !state.currentFile) return;
      await openPdf(state.currentFile);
    });

    loadAllMeta();
  </script>
</body>
</html>
